<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Log In | LetsBuild</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- HEADER -->
    <header>
      <div class="header-inner">
        <h1 class="logo">Let's Build</h1>
        <nav>
          <a href="index.html">Home</a>
          <a href="projects-hub.html">Projects Hub</a>
          <a href="login.html">Log In</a>
          <a href="signup.html">Sign Up</a>
        </nav>
      </div>
    </header>

    <!-- LOGIN SECTION -->
    <section class="auth-page">
      <div class="auth-grid-overlay"></div>
      <div class="sketch-cluster sketch-top" aria-hidden="true">
        <span class="machine-gear machine-gear-small"></span>
        <span class="machine-bracket machine-bracket-top"></span>
        <span class="machine-bolt machine-bolt-top"></span>
      </div>

      <div class="sketch-cluster sketch-left" aria-hidden="true">
        <span class="machine-gear machine-gear-large"></span>
        <span class="machine-arm machine-arm-left"></span>
        <span class="machine-bolt machine-bolt-left"></span>
        <span class="machine-measure machine-measure-left"></span>
      </div>

      <div class="sketch-cluster sketch-right" aria-hidden="true">
        <span class="machine-gear machine-gear-medium"></span>
        <span class="machine-bracket machine-bracket-right"></span>
        <span class="machine-arm machine-arm-right"></span>
        <span class="machine-bolt machine-bolt-right"></span>
      </div>

      <div class="sketch-cluster sketch-bottom" aria-hidden="true">
        <span class="machine-bracket machine-bracket-bottom"></span>
        <span class="machine-measure machine-measure-bottom"></span>
        <span class="machine-bolt machine-bolt-bottom"></span>
      </div>

      <div class="auth-card">
        <div class="auth-card-marker auth-card-marker-top" aria-hidden="true"></div>
        <div class="auth-card-marker auth-card-marker-bottom" aria-hidden="true"></div>
        <div class="auth-kicker">Project Access 003</div>

        <h2>Welcome back</h2>
        <p class="auth-subtitle">Log in to your LetsBuild account</p>

        <!-- FORM -->
        <div class="auth-form">
          <input type="email" placeholder="Email Address" />
          <input type="password" placeholder="Password" />
          <button class="btn-primary">Log In</button>
        </div>

        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>

      </div>

    </section>

  <script type="module">
    import { supabase } from './supabase.js'

    document.querySelector('.btn-primary').addEventListener('click', async () => {

      const email    = document.querySelectorAll('input')[0].value
      const password = document.querySelectorAll('input')[1].value

      if (!email || !password) {
        alert('Please enter your email and password')
        return
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      })

      if (error) {
        alert('Error: ' + error.message)
      } else {
        // Redirect based on role
        const role = data.user.user_metadata.role
        if (role === 'student') {
          window.location.href = 'post-project.html'
        } else {
          window.location.href = 'projects-hub.html'
        }
      }

    })
  </script>

</body>
</html>
