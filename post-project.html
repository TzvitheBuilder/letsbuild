<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Post a Project | LetsBuild</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- HEADER -->
    <header>
      <div class="header-inner">
        <h1 class="logo">Let's Build</h1>
        <nav>
          <a href="index.html">Home</a>
          <a href="projects-hub.html">Projects Hub</a>
          <a href="login.html">Log In</a>
          <a href="signup.html">Sign Up</a>
        </nav>
      </div>
    </header>

    <!-- POST PROJECT SECTION -->
    <section class="auth-page">

      <div class="auth-card post-card">

        <h2>Post Your Project</h2>
        <p class="auth-subtitle">Share your work with mentors on LetsBuild</p>

        <div class="auth-form">

          <!-- PROJECT TITLE -->
          <input type="text" placeholder="Project Title" />

          <!-- PROJECT OVERVIEW -->
          <textarea placeholder="Write a short overview of your project..." rows="5"></textarea>

          <!-- PHOTO UPLOAD -->
          <div class="upload-box" onclick="document.getElementById('photo-upload').click()">
            <input type="file" id="photo-upload" accept="image/*" hidden />
            <div class="upload-inner" id="upload-inner">
              <span class="upload-icon">📷</span>
              <p>Click to upload a cover photo</p>
              <p class="upload-hint">JPG, PNG or WEBP — max 5MB</p>
            </div>
          </div>

          <button class="btn-primary">Submit Project</button>

        </div>

      </div>

    </section>

  </body>

 <script type="module">
  import { supabase } from './supabase.js'

  // ── IMAGE PREVIEW ──
  document.getElementById('photo-upload').addEventListener('change', function(e) {
    const file = e.target.files[0]
    if (!file) return

    const reader = new FileReader()
    reader.onload = function(ev) {
      const inner = document.getElementById('upload-inner')
      inner.innerHTML = `<img src="${ev.target.result}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;" />`
    }
    reader.readAsDataURL(file)
  })

  // ── SUBMIT PROJECT ──
  document.querySelector('.btn-primary').addEventListener('click', async () => {

    // Grab form values
    const title    = document.querySelectorAll('input')[0].value
    const overview = document.querySelector('textarea').value
    const file     = document.getElementById('photo-upload').files[0]

    // Basic checks
    if (!title || !overview || !file) {
      alert('Please fill in all fields and upload a cover photo')
      return
    }

    // Check user is logged in
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) {
      alert('You must be logged in to post a project')
      window.location.href = 'login.html'
      return
    }

    // 1. Upload photo to Supabase Storage
    const fileExt   = file.name.split('.').pop()
    const fileName  = `${user.id}-${Date.now()}.${fileExt}`

    const { error: uploadError } = await supabase
      .storage
      .from('project-covers')
      .upload(fileName, file)

    if (uploadError) {
      alert('Photo upload failed: ' + uploadError.message)
      return
    }

    // 2. Get the public URL of the uploaded photo
    const { data: urlData } = supabase
      .storage
      .from('project-covers')
      .getPublicUrl(fileName)

    const coverUrl = urlData.publicUrl

    // 3. Save project to database
    const { error: insertError } = await supabase
      .from('projects')
      .insert({
        title,
        overview,
        cover_url: coverUrl,
        student_id: user.id
      })

    if (insertError) {
      alert('Error saving project: ' + insertError.message)
      return
    }

    // Success!
    alert('Project posted successfully!')
    window.location.href = 'projects-hub.html'

  })
</script>

</html>
