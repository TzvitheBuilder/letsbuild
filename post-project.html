<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Post a Project | LetsBuild</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- HEADER -->
    <header>
      <div class="header-inner">
        <h1 class="logo">Let's Build</h1>
        <nav>
          <a href="index.html">Home</a>
          <a href="projects-hub.html">Projects Hub</a>
          <a href="login.html">Log In</a>
          <a href="signup.html">Sign Up</a>
        </nav>
      </div>
    </header>

    <!-- POST PROJECT SECTION -->
    <section class="auth-page">

      <div class="auth-card post-card">

        <h2>Post Your Project</h2>
        <p class="auth-subtitle">Share your work with mentors on LetsBuild</p>

        <div class="auth-form">

          <!-- PROJECT TITLE -->
          <input type="text" placeholder="Project Title" />

          <!-- PROJECT OVERVIEW -->
          <textarea placeholder="Write a short overview of your project..." rows="5"></textarea>

          <!-- PHOTO UPLOAD -->
          <div class="upload-box" onclick="document.getElementById('photo-upload').click()">
            <input type="file" id="photo-upload" accept="image/*" hidden />
            <div class="upload-inner" id="upload-inner">
              <span class="upload-icon">📷</span>
              <p>Click to upload a cover photo</p>
              <p class="upload-hint">JPG, PNG or WEBP — max 5MB</p>
            </div>
          </div>

          <button class="btn-primary">Submit Project</button>

        </div>

      </div>

    </section>

  </body>

  <script>
    // Show image preview when a photo is selected
    document.getElementById('photo-upload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        const inner = document.getElementById('upload-inner');
        inner.innerHTML = `<img src="${ev.target.result}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;" />`;
      };
      reader.readAsDataURL(file);
    });
  </script>

</html>
