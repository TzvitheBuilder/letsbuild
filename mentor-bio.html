<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mentor Bio | LetsBuild</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1 class="logo">Let's Build</h1>
        <nav>
          <a href="index.html">Home</a>
          <a href="projects-hub.html">Projects Hub</a>
          <a href="login.html">Log In</a>
          <a href="signup.html">Sign Up</a>
        </nav>
      </div>
    </header>

    <main class="mentor-bio-page">
      <section class="mentor-bio-shell">
        <div class="mentor-bio-panel">
          <div class="blueprint-label">— MENTOR DOSSIER —</div>
          <h2>Build your mentor bio</h2>
          <p class="mentor-bio-subtitle">Students should be able to see who you are, what you know, and how you can help.</p>

          <form class="mentor-bio-form" id="mentor-bio-form">
            <input type="text" id="mentor-name" placeholder="Full Name" />
            <input type="text" id="mentor-headline" placeholder="Headline (ex. Product designer and robotics mentor)" />
            <input type="text" id="mentor-expertise" placeholder="Expertise (ex. CAD, AI, electronics)" />
            <input type="text" id="mentor-availability" placeholder="Availability (ex. 2 hours a week)" />
            <input type="url" id="mentor-portfolio" placeholder="Portfolio or LinkedIn URL" />
            <textarea id="mentor-bio" rows="7" placeholder="Write a short mentor bio..."></textarea>
            <button class="btn-primary" type="submit">Save Mentor Bio</button>
          </form>

          <p class="mentor-bio-status" id="mentor-bio-status"></p>
        </div>
      </section>
    </main>

    <script type="module">
      import { supabase } from './supabase.js'

      const form = document.getElementById('mentor-bio-form')
      const statusEl = document.getElementById('mentor-bio-status')
      const nameEl = document.getElementById('mentor-name')
      const headlineEl = document.getElementById('mentor-headline')
      const expertiseEl = document.getElementById('mentor-expertise')
      const availabilityEl = document.getElementById('mentor-availability')
      const portfolioEl = document.getElementById('mentor-portfolio')
      const bioEl = document.getElementById('mentor-bio')

      let currentUser = null

      async function loadProfile() {
        const { data: { user } } = await supabase.auth.getUser()
        if (!user) {
          window.location.href = 'login.html'
          return
        }

        currentUser = user

        if (user.user_metadata.role !== 'mentor') {
          window.location.href = 'post-project.html'
          return
        }

        nameEl.value = user.user_metadata.full_name || ''

        const { data, error } = await supabase
          .from('mentor_profiles')
          .select('*')
          .eq('user_id', user.id)
          .maybeSingle()

        if (error) {
          statusEl.textContent = 'Unable to load your existing mentor bio yet. You can still create one now.'
          return
        }

        if (!data) {
          return
        }

        nameEl.value = data.full_name || nameEl.value
        headlineEl.value = data.headline || ''
        expertiseEl.value = data.expertise || ''
        availabilityEl.value = data.availability || ''
        portfolioEl.value = data.portfolio_url || ''
        bioEl.value = data.bio || ''
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault()

        if (!currentUser) return

        const payload = {
          user_id: currentUser.id,
          full_name: nameEl.value.trim(),
          headline: headlineEl.value.trim(),
          expertise: expertiseEl.value.trim(),
          availability: availabilityEl.value.trim(),
          portfolio_url: portfolioEl.value.trim(),
          bio: bioEl.value.trim()
        }

        if (!payload.full_name || !payload.headline || !payload.bio) {
          statusEl.textContent = 'Please fill in your name, headline, and bio.'
          return
        }

        const { error } = await supabase
          .from('mentor_profiles')
          .upsert(payload, { onConflict: 'user_id' })

        if (error) {
          statusEl.textContent = 'Could not save your mentor bio yet. Make sure the mentor_profiles table and policies are created in Supabase.'
          return
        }

        statusEl.textContent = 'Mentor bio saved. Sending you to the projects hub...'
        window.setTimeout(() => {
          window.location.href = 'projects-hub.html'
        }, 900)
      })

      loadProfile()
    </script>
  </body>
</html>
