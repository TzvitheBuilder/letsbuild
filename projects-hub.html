<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Projects Hub | LetsBuild</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <header>
      <div class="header-inner">
        <h1 class="logo">Let's Build</h1>
        <nav>
          <a href="index.html">Home</a>
          <a href="projects-hub.html">Projects Hub</a>
          <a href="login.html">Log In</a>
          <a href="signup.html">Sign Up</a>
        </nav>
      </div>
    </header>

    <section class="hub-header">
      <h2>Projects Hub</h2>
      <p>Browse projects from students in your community</p>
    </section>

    <section class="hub-grid" id="project-grid">
      <p class="loading-text" id="loading-text">Loading projects...</p>
    </section>

  <script type="module">
    import { supabase } from './supabase.js'

    const grid        = document.getElementById('project-grid')
    const loadingText = document.getElementById('loading-text')

    async function loadProjects() {

      const { data: projects, error } = await supabase
        .from('projects')
        .select('*')
        .order('created_at', { ascending: false })

      if (error) {
        loadingText.textContent = 'Failed to load projects. Please try again.'
        return
      }

      if (projects.length === 0) {
        loadingText.textContent = 'No projects posted yet — check back soon!'
        return
      }

      loadingText.remove()

      projects.forEach(project => {
        const card = document.createElement('div')
        card.className = 'project-card'
        card.innerHTML = `
          <div class="card-image">
            <img src="${project.cover_url}" alt="${project.title}" />
          </div>
          <div class="card-body">
            <h3>${project.title}</h3>
            <p>${project.overview}</p>
            <div class="card-footer">
              <span class="card-tag">Student Project</span>
              <a href="#" class="card-link">View Project →</a>
            </div>
          </div>
        `
        grid.appendChild(card)
      })

    }

    loadProjects()

  </script>

  </body>
</html>
